name: Compile Only

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compile:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (compile-only)
        run: cmake -S . -B build -DMORPHEUS_COMPILE_ONLY=ON

      - name: Build
        run: cmake --build build --config Release

